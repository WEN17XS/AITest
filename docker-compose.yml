services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aitesthub-db
    environment:
      POSTGRES_DB: aitesthub
      POSTGRES_USER: aitest
      POSTGRES_PASSWORD: aitest
    ports:
      - "5433:5432"
    volumes:
      - aitesthub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitest -d aitesthub"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aitesthub-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aitesthub_pgdata:
